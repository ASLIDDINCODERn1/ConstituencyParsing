<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>O'zbek tili — Constituency Parser</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="page">

        <!-- ═══ Header ════════════════════════════════════════════════════ -->
        <header class="header">
            <div class="header-inner">
                <h1 class="title">O'zbek tili — Constituency Parser</h1>
                <p class="subtitle">Gapni sintaktik tarkibiy qismlarga ajratish tizimi</p>
                <div class="api-row">
                    <label class="api-label">Groq API Key:</label>
                    <div class="api-field">
                        <input type="password" id="apiKey" placeholder="gsk_..." class="api-input" autocomplete="off">
                        <button onclick="saveKey()" class="btn-save">Saqlash</button>
                        <span id="keyStatus" class="key-status"></span>
                    </div>
                </div>
            </div>
        </header>

        <main class="main">

            <!-- ═══ Asl matn ══════════════════════════════════════════════ -->
            <div class="card">
                <div class="card-title">Asl matn</div>
                <div class="card-body">
                    <textarea
                        id="inputText"
                        rows="4"
                        placeholder="O'zbek tilida gap kiriting...&#10;Masalan: Tarix hayotning haqiqiy o'qituvchisidir.&#10;&#10;Tahlil uchun Ctrl+Enter bosing.">
                    </textarea>
                    <div class="btn-row">
                        <button id="analyzeBtn" class="btn-primary" onclick="startAnalysis()">Tahlil qilish</button>
                        <button class="btn-ghost" onclick="clearAll()">Tozalash</button>
                    </div>
                </div>
            </div>

            <!-- ═══ Matn tahlili ══════════════════════════════════════════ -->
            <div class="card" id="cardResult" style="display:none">
                <div class="card-title">Matn tahlili</div>
                <div class="card-body">

                    <!-- Constituency tree -->
                    <div class="tree-label">Constituency daraxt</div>
                    <div class="tree-box" id="treeBox"></div>

                    <!-- Linguistic table -->
                    <div class="tree-label" style="margin-top:22px">Lingvistik ta'minot</div>
                    <div class="table-box">
                        <table id="lingTable">
                            <thead>
                                <tr>
                                    <th>SentenceID</th>
                                    <th>tokenID</th>
                                    <th>token</th>
                                    <th>BI</th>
                                    <th>Lemma</th>
                                    <th>Tag</th>
                                    <th>Chunk tag</th>
                                </tr>
                            </thead>
                            <tbody id="tableBody"></tbody>
                        </table>
                    </div>

                    <!-- Copy / Download -->
                    <div class="copy-row">
                        <button class="btn-copy" onclick="copyTable(this)">&#9112; Nusxa olish</button>
                        <button class="btn-ghost" onclick="downloadSVG()">&#8675; SVG yuklab olish</button>
                    </div>

                </div>
            </div>

            <!-- Error -->
            <div id="errBox" class="err-box" style="display:none"></div>

        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
